<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsor een fietser - Coduvelo Tour '76</title>
  <link rel="stylesheet" href="assets/main.css">
</head>

<body>
 <div id="cdv-app">
  <div class="cdv-header">
    <h1>Coduvelo Tour '76</h1>
    <p>Healthy Heart Fund — Sponsor een fietser</p>
  </div>
 
  <div class="cdv-card">
    <div class="cdv-card-title">Kies uw fietser</div>
    <label>Fietser</label>
    <select id="cdv-cyclist" onchange="cdvCyclistChange()">
      <option value="" data-max="0" disabled selected>Maak uw keuze...</option>
      <option value="Alain Peleman" data-max="52500">Alain Peleman (52.500 hm)</option>
      <option value="Stephane Vandamme" data-max="52500">Stephane Vandamme (52.500 hm)</option>
      <option value="Marc Boets" data-max="52500">Marc Boets (52.500 hm)</option>
      <option value="Tijl Decuypere" data-max="14500">Tijl Decuypere (14.500 hm)</option>
      <option value="Geert Mylle" data-max="21000">Geert Mylle (21.000 hm)</option>
      <option value="Geert De Boitselier" data-max="21000">Geert De Boitselier (21.000 hm)</option>
      <option value="Piet Vermeire" data-max="18500">Piet Vermeire (18.500 hm)</option>
      <option value="Bart Coosemans" data-max="19000">Bart Coosemans (19.000 hm)</option>
      <option value="Guy Peleman" data-max="12000">Guy Peleman (12.000 hm)</option>
      <option value="Stef Vernimmen" data-max="2500">Stef Vernimmen (2.500 hm)</option>
      <option value="William Claeys" data-max="2500">William Claeys (2.500 hm)</option>
      <option value="Eric Arens" data-max="2500">Eric Arens (2.500 hm)</option>
      <option value="Christophe Lenain" data-max="2500">Christophe Lenain (2.500 hm)</option>
      <option value="Marty Debruyne" data-max="2500">Marty Debruyne (2.500 hm)</option>
      <option value="Kurt Van Remoortel" data-max="2500">Kurt Van Remoortel (2.500 hm)</option>
      <option value="Frank Polspoel" data-max="2500">Frank Polspoel (2.500 hm)</option>
      <option value="Christophe De Laet" data-max="2500">Christophe De Laet (2.500 hm)</option>
      <option value="Filip Boelpaep" data-max="2500">Filip Boelpaep (2.500 hm)</option>
      <option value="Frank Dekempeneer" data-max="2500">Frank Dekempeneer (2.500 hm)</option>
      <option value="Ferre Deroover" data-max="2500">Ferre Deroover (2.500 hm)</option>
      <option value="Jorgen De Wael" data-max="2500">Jorgen De Wael (2.500 hm)</option>
      <option value="Patrick Moens" data-max="2500">Patrick Moens (2.500 hm)</option>
      <option value="Ingrid Vanhoegaerden" data-max="2500">Ingrid Vanhoegaerden (2.500 hm)</option>
      <option value="Els d'Hondt" data-max="2500">Els d'Hondt (2.500 hm)</option>
      <option value="Koen Spruyt" data-max="500">Koen Spruyt (500 hm)</option>
      <option value="Dimitri De Hertefelt" data-max="500">Dimitri De Hertefelt (500 hm)</option>
      <option value="Jos Dewinter" data-max="500">Jos Dewinter (500 hm)</option>
      <option value="Stijn Dewinter" data-max="500">Stijn Dewinter (500 hm)</option>
      <option value="Frank Vandorpe" data-max="500">Frank Vandorpe (500 hm)</option>
      <option value="Wim Smout" data-max="500">Wim Smout (500 hm)</option>
      <option value="Guido Martin" data-max="500">Guido Martin (500 hm)</option>
      <option value="Jan Anthierens" data-max="500">Jan Anthierens (500 hm)</option>
      <option value="Gerd Balis" data-max="500">Gerd Balis (500 hm)</option>
      <option value="Dirk Merckx" data-max="500">Dirk Merckx (500 hm)</option>
      <option value="Peter Berghs" data-max="500">Peter Berghs (500 hm)</option>
      <option value="Michiel Coltura" data-max="500">Michiel Coltura (500 hm)</option>
      <option value="Luc De Munck" data-max="2500">Luc De Munck (2.500 hm)</option>
      <option value="Erik Puttemans" data-max="2500">Erik Puttemans (2.500 hm)</option>
      <option value="Luc Eeckhout" data-max="2500">Luc Eeckhout (2.500 hm)</option>
      <option value="Johan Berckmans" data-max="500">Johan Berckmans (500 hm)</option>
      <option value="Albert Vanhie" data-max="9500">Albert Vanhie (9.500 hm)</option>
      <option value="Jochen Vanpoeyer" data-max="500">Jochen Vanpoeyer (500 hm)</option>
    </select>
    
    <label>Naam Sponsor</label>
    <input type="text" id="cdv-sponsor-name" placeholder="Uw naam of bedrijfsnaam">
    
    <label>Kies uw sponsorbedrag per 500 hm</label>
    <div class="cdv-amount-grid">
      <div class="cdv-amount-btn" data-amount="0.5" onclick="cdvSelectAmount(0.5)">€ 0,50</div>
      <div class="cdv-amount-btn" data-amount="5" onclick="cdvSelectAmount(5)">€ 5,00</div>
      <div class="cdv-amount-btn" data-amount="10" onclick="cdvSelectAmount(10)">€ 10,00</div>
      <div class="cdv-amount-btn" data-amount="custom" onclick="cdvSelectAmount('custom')">Bedrag kiezen</div>
    </div>
    
    <div id="cdv-custom-wrapper" class="cdv-custom-input">
      <label>Uw bedrag per 500 hm (€)</label>
      <input type="number" id="cdv-custom-amount" min="0.10" step="0.10" placeholder="0.00" oninput="cdvCustomAmountChange()">
    </div>
  </div>
 
  <div class="cdv-card">
    <div class="cdv-card-title">Voortgang op de berg</div>
    <div class="cdv-mountain-wrap">
      <svg id="cdv-svg-element" viewBox="0 0 400 140" preserveAspectRatio="none">
        <defs>
          <linearGradient id="cdvG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#D9D2C7"/>
            <stop offset="100%" stop-color="#c8bdb0"/>
          </linearGradient>
        </defs>
        <path d="M0 125 C40 110,90 95,140 98 C190 102,240 68,295 38 C335 16,368 18,400 4 L400 140 L0 140 Z" fill="url(#cdvG)" stroke="#b5ac9e" stroke-width="2"/>
        <path id="cdv-ride-path" fill="none" d="M0 125 C40 110,90 95,140 98 C190 102,240 68,295 38 C335 16,368 18,400 4"/>
      </svg>
      <div id="cdv-finish-node" class="cdv-finish-flag">
        <div class="cdv-flag-red"></div>
        <div class="cdv-flag-pole"></div>
      </div>
      <div id="cdv-bike">
        <div id="cdv-fw" class="cdv-fw">✨🎆✨</div>
        🚴
      </div>
    </div>
 
    <div class="cdv-stepper">
      <div class="cdv-hm-big" id="cdv-chosen-hm">0</div>
      <div style="font-size:11px;text-transform:uppercase;color:var(--dark-light);">Hoogtemeters gesponsord</div>
      <div id="cdv-hm-of" style="font-size:11px;color:var(--dark-light);margin-top:4px;">Kies eerst een fietser</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;">
        <button id="cdv-btn-min"  class="cdv-btn cdv-btn-outline" onclick="cdvChangeHm(-500)" disabled>− 500 hm</button>
        <button id="cdv-btn-plus" class="cdv-btn cdv-btn-outline" onclick="cdvChangeHm(500)"  disabled>+ 500 hm</button>
      </div>
      <button id="cdv-btn-full" class="cdv-btn" style="margin-top:10px;font-size:10px;background:var(--dark);color:#fff;opacity:0.4;" onclick="cdvFull()" disabled>Sponsor volledige klim van fietser</button>
    </div>
 
    <div class="cdv-total-display">
      <div class="cdv-total-label">Uw sponsorbedrag</div>
      <div class="cdv-total-amount">€ <span id="cdv-total">0,00</span></div>
      <div class="cdv-per-hm" id="cdv-rate-display"></div>
    </div>
 
    <p class="cdv-donate-note">Vul dit bedrag in bij "Vrij bedrag" op de volgende donatiepagina.</p>
    <button id="cdv-submit" class="cdv-btn cdv-btn-accent" onclick="cdvConfirm()" disabled>Ga naar de donatiepagina →</button>
  </div>
</div>
 
<script>
(function(){
  // VERVANG DIT DOOR JOUW GOOGLE APPS SCRIPT URL
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLPDmCIqQsfj-NGilxKJDNylTY66wYY4zEc3UAa1tXfURdy4XpmL61mQ6cb_GrWE5A/exec';
  
  var chosenHm = 0, maxHm = 0;
  var selectedRate = 0;
  var isCustom = false;
 
  window.cdvSelectAmount = function(amount) {
    // Deactivate all buttons
    var btns = document.querySelectorAll('.cdv-amount-btn');
    btns.forEach(function(b) { b.classList.remove('active'); });
    
    if (amount === 'custom') {
      // Show custom input
      btns[3].classList.add('active');
      isCustom = true;
      document.getElementById('cdv-custom-wrapper').classList.add('show');
      var customVal = parseFloat(document.getElementById('cdv-custom-amount').value) || 0;
      selectedRate = customVal;
    } else {
      // Set fixed amount
      isCustom = false;
      selectedRate = parseFloat(amount);
      document.getElementById('cdv-custom-wrapper').classList.remove('show');
      
      // Activate correct button
      btns.forEach(function(b) {
        if (parseFloat(b.dataset.amount) === parseFloat(amount)) {
          b.classList.add('active');
        }
      });
    }
    cdvUpdateUI();
  };
 
  window.cdvCustomAmountChange = function() {
    var val = parseFloat(document.getElementById('cdv-custom-amount').value);
    if (!isNaN(val) && val > 0) {
      selectedRate = val;
    } else {
      selectedRate = 0;
    }
    cdvUpdateUI();
  };
 
  window.cdvCyclistChange = function() {
    var sel = document.getElementById('cdv-cyclist');
    maxHm   = parseInt(sel.options[sel.selectedIndex].dataset.max) || 0;
    chosenHm = 0;
    document.getElementById('cdv-btn-min').disabled  = false;
    document.getElementById('cdv-btn-plus').disabled = false;
    document.getElementById('cdv-btn-full').disabled = false;
    document.getElementById('cdv-btn-full').style.opacity = '1';
    document.getElementById('cdv-bike').style.visibility  = 'visible';
    cdvMoveBike(); 
    cdvUpdateUI();
  };
 
  window.cdvChangeHm = function(d) {
    if(!maxHm) return;
    chosenHm = Math.max(0, Math.min(maxHm, chosenHm + d));
    cdvMoveBike(); 
    cdvUpdateUI();
  };
 
  window.cdvFull = function() {
    if(!maxHm) return;
    chosenHm = maxHm;
    cdvMoveBike(); 
    cdvUpdateUI();
  };
 
  function getScale() {
    var wrap = document.querySelector('#cdv-app .cdv-mountain-wrap');
    return { x: wrap.offsetWidth / 400, y: wrap.offsetHeight / 140 };
  }
 
  function positionFlag() {
    var path = document.getElementById('cdv-ride-path');
    var flag = document.getElementById('cdv-finish-node');
    try {
      var s = getScale(), end = path.getPointAtLength(path.getTotalLength());
      flag.style.left = (end.x * s.x - 2) + 'px';
      flag.style.top  = (end.y * s.y - 49) + 'px';
    } catch(e) {}
  }
 
  function cdvMoveBike() {
    var path = document.getElementById('cdv-ride-path');
    var bike = document.getElementById('cdv-bike');
    try {
      var s     = getScale();
      var ratio = maxHm > 0 ? chosenHm / maxHm : 0;
      var pt    = path.getPointAtLength(path.getTotalLength() * ratio);
      bike.style.left = (pt.x * s.x) + 'px';
      bike.style.top  = (pt.y * s.y) + 'px';
      document.getElementById('cdv-fw').style.opacity = (chosenHm >= maxHm && maxHm > 0) ? '1' : '0';
    } catch(e) {}
  }
 
  window.cdvUpdateUI = function() {
    var cyclist = document.getElementById('cdv-cyclist').value;
    var name    = document.getElementById('cdv-sponsor-name').value.trim();
    
    document.getElementById('cdv-chosen-hm').innerText = chosenHm.toLocaleString('nl-BE');
    document.getElementById('cdv-hm-of').innerText     = maxHm > 0 ? 'doel: ' + maxHm.toLocaleString('nl-BE') + ' hm' : 'Kies eerst een fietser';
    
    // Calculate total amount
    var totalAmount = (chosenHm / 500) * selectedRate;
    document.getElementById('cdv-total').innerText = totalAmount.toFixed(2).replace('.', ',');
    
    // Update rate display
    if (selectedRate > 0) {
      document.getElementById('cdv-rate-display').innerText = '€ ' + selectedRate.toFixed(2).replace('.', ',') + ' per 500 hm';
    } else {
      document.getElementById('cdv-rate-display').innerText = '';
    }
    
    // Enable submit button only when all fields are filled
    document.getElementById('cdv-submit').disabled = !(cyclist && name && chosenHm > 0 && selectedRate > 0);
  };
 
  window.cdvConfirm = function() {
    var cyclist = document.getElementById('cdv-cyclist').value;
    var name    = document.getElementById('cdv-sponsor-name').value.trim();
    var totalAmount = (chosenHm / 500) * selectedRate;
    var totalFormatted = totalAmount.toFixed(2); // Met punt voor backend
    var totalDisplay = totalAmount.toFixed(2).replace('.', ','); // Met komma voor display
    
    var btn = document.getElementById('cdv-submit');
    btn.innerText = 'Opslaan...';
    btn.disabled  = true;
    
    console.log('Submitting data:', {
      fietser: cyclist,
      sponsor: name,
      bedrag: totalFormatted,
      hm: chosenHm,
      tarief: selectedRate
    });
    
    // Probeer eerst data op te slaan in Google Sheets
    var formData = new FormData();
    formData.append('fietser', cyclist);
    formData.append('sponsor', name);
    formData.append('bedrag', totalFormatted);
    formData.append('hm', chosenHm);
    formData.append('tarief', selectedRate);
    
    // POST request naar Google Apps Script
    fetch(SCRIPT_URL, {
      method: 'POST',
      body: formData,
      mode: 'no-cors' // CORS bypass
    })
    .then(function() {
      console.log('Data verzonden naar Google Sheets');
    })
    .catch(function(err) {
      console.error('Fout bij opslaan:', err);
    })
    .finally(function() {
      // Na 1 seconde doorsturen naar donatiepagina
      setTimeout(function() {
        // Store data in localStorage for confirmation page
        try {
          localStorage.setItem('cdv_lastDonation', JSON.stringify({
            cyclist: cyclist,
            sponsor: name,
            amount: totalFormatted,
            hm: chosenHm,
            rate: selectedRate,
            timestamp: new Date().toISOString()
          }));
        } catch(e) {
          console.log('LocalStorage not available');
        }
        
        // Redirect naar KUL donatiepagina
        window.location.href = 'https://donate.kuleuven.cloud/Coduvelo-76/';
      }, 1000);
    });
  };
 
  document.getElementById('cdv-sponsor-name').addEventListener('input', cdvUpdateUI);
  window.addEventListener('resize', function() { 
    positionFlag(); 
    cdvMoveBike(); 
  });
  
  function init() { 
    positionFlag(); 
    cdvUpdateUI(); 
  }
  
  if(document.readyState === 'complete') { 
    setTimeout(init, 100); 
  } else { 
    window.addEventListener('load', function(){ 
      setTimeout(init, 100); 
    }); 
  }
})();
</script>
