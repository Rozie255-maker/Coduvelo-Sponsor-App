<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sponsor een fietser - Coduvelo Tour '76</title>
  <link rel="stylesheet" href="assets/main.css">
</head>
<body>
  <div id="cdv-app">

    <div class="cdv-header">
      <h1>Coduvelo Tour '76</h1>
      <p>Healthy Heart Fund — Sponsor een fietser</p>
    </div>

    <!-- FORM START -->
    <form id="cdv-form">

      <!-- CARD 1: Fietser + Sponsor -->
      <div class="cdv-card">
        <div class="cdv-card-title">Kies uw fietser</div>
        <label>Fietser</label>
        <select id="cdv-cyclist">
          <option value="" data-max="0" disabled selected>Maak uw keuze...</option>
               <option value="" data-max="0" disabled selected>Maak uw keuze...</option>
        <option value="Alain Peleman" data-max="52500">Alain P (52.500 hm)</option>
        <option value="Stephane Vandamme" data-max="52500">Stephane V (52.500 hm)</option>
        <option value="Marc Boets" data-max="52500">Marc B (52.500 hm)</option>
        <option value="Tijl Decuypere" data-max="14500">Tijl D (14.500 hm)</option>
        <option value="Geert Mylle" data-max="21000">Geert M (21.000 hm)</option>
        <option value="Geert De Boitselier" data-max="21000">Geert DB (21.000 hm)</option>
        <option value="Piet Vermeire" data-max="18500">Piet V (18.500 hm)</option>
        <option value="Bart Coosemans" data-max="19000">Bart C (19.000 hm)</option>
        <option value="Guy Peleman" data-max="12000">Guy P (12.000 hm)</option>
        <option value="Stef Vernimmen" data-max="2500">Stef V (2.500 hm)</option>
        <option value="William Claeys" data-max="2500">William C (2.500 hm)</option>
        <option value="Eric Arens" data-max="2500">Eric A (2.500 hm)</option>
        <option value="Christophe Lenain" data-max="2500">Christophe L (2.500 hm)</option>
        <option value="Marty Debruyne" data-max="2500">Marty D (2.500 hm)</option>
        <option value="Kurt Van Remoortel" data-max="2500">Kurt VR (2.500 hm)</option>
        <option value="Frank Polspoel" data-max="2500">Frank P (2.500 hm)</option>
        <option value="Christophe De Laet" data-max="2500">Christophe DL (2.500 hm)</option>
        <option value="Filip Boelpaep" data-max="2500">Filip B (2.500 hm)</option>
        <option value="Frank Dekempeneer" data-max="2500">Frank D (2.500 hm)</option>
        <option value="Ferre Deroover" data-max="2500">Ferre D (2.500 hm)</option>
        <option value="Jorgen De Wael" data-max="2500">Jorgen DW (2.500 hm)</option>
        <option value="Patrick Moens" data-max="2500">Patrick M (2.500 hm)</option>
        <option value="Ingrid Vanhoegaerden" data-max="2500">Ingrid V (2.500 hm)</option>
        <option value="Els d'Hondt" data-max="2500">Els d'H (2.500 hm)</option>
        <option value="Koen Spruyt" data-max="500">Koen S (500 hm)</option>
        <option value="Dimitri De Hertefelt" data-max="500">Dimitri DH (500 hm)</option>
        <option value="Jos Dewinter" data-max="500">Jos D (500 hm)</option>
        <option value="Stijn Dewinter" data-max="500">Stijn D (500 hm)</option>
        <option value="Frank Vandorpe" data-max="500">Frank V (500 hm)</option>
        <option value="Wim Smout" data-max="500">Wim S (500 hm)</option>
        <option value="Guido Martin" data-max="500">Guido M (500 hm)</option>
        <option value="Jan Anthierens" data-max="500">Jan A (500 hm)</option>
        <option value="Gerd Balis" data-max="500">Gerd B (500 hm)</option>
        <option value="Dirk Merckx" data-max="500">Dirk M (500 hm)</option>
        <option value="Peter Berghs" data-max="500">Peter B (500 hm)</option>
        <option value="Michiel Coltura" data-max="500">Michiel C (500 hm)</option>
        <option value="Luc De Munck" data-max="2500">Luc DM (2.500 hm)</option>
        <option value="Erik Puttemans" data-max="2500">Erik P (2.500 hm)</option>
        <option value="Luc Eeckhout" data-max="2500">Luc E (2.500 hm)</option>
        <option value="Johan Berckmans" data-max="500">Johan B (500 hm)</option>
        <option value="Albert Vanhie" data-max="9500">Albert V (9.500 hm)</option>
        <option value="Jochen Vanpoeyer" data-max="500">Jochen V (500 hm)</option>
      </select>
        </select>

        <label>Naam Sponsor</label>
        <input type="text" id="cdv-sponsor" placeholder="Uw naam of bedrijfsnaam">

        <label>Kies uw sponsorbedrag per 500 hm</label>
        <div class="cdv-amount-grid">
          <div class="cdv-amount-btn" data-amount="0.5">€ 0,50</div>
          <div class="cdv-amount-btn" data-amount="5">€ 5,00</div>
          <div class="cdv-amount-btn" data-amount="10">€ 10,00</div>
          <div class="cdv-amount-btn" data-amount="custom">Bedrag kiezen</div>
        </div>

        <div id="cdv-custom-wrapper" class="cdv-custom-input">
          <label>Uw bedrag per 500 hm (€)</label>
          <input type="number" id="cdv-rate" min="0.10" step="0.10" placeholder="0.00">
        </div>
      </div>

      <!-- CARD 2: Mountain + HM -->
      <div class="cdv-card">
        <div class="cdv-card-title">Voortgang op de berg</div>

        <div class="cdv-mountain-wrap">
          <!-- jouw SVG blijft identiek -->
          <!-- bike + flag blijven identiek -->
        </div>

        <div class="cdv-stepper">
          <div class="cdv-hm-big" id="cdv-hm">0</div>
          <div style="font-size:11px;text-transform:uppercase;color:var(--dark-light);">
            Hoogtemeters gesponsord
          </div>

          <div id="cdv-hm-of" style="font-size:11px;color:var(--dark-light);margin-top:4px;">
            Kies eerst een fietser
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px;">
            <button type="button" id="cdv-btn-min" class="cdv-btn cdv-btn-outline" disabled>− 500 hm</button>
            <button type="button" id="cdv-btn-plus" class="cdv-btn cdv-btn-outline" disabled>+ 500 hm</button>
          </div>

          <button type="button" id="cdv-btn-full" class="cdv-btn" style="margin-top:10px;font-size:10px;background:var(--dark);color:#fff;opacity:0.4;" disabled>
            Sponsor volledige klim van fietser
          </button>
        </div>

        <div class="cdv-total-display">
          <div class="cdv-total-label">Uw sponsorbedrag</div>
          <div class="cdv-total-amount">€ <span id="cdv-total-amount">0,00</span></div>
          <div class="cdv-per-hm" id="cdv-rate-display"></div>
        </div>

        <p class="cdv-donate-note">Controleer dit bedrag op de volgende donatiepagina.</p>

        <button id="cdv-submit" class="cdv-btn cdv-btn-accent" disabled>
          Ga naar de donatiepagina →
        </button>
      </div>

    </form>
    <!-- FORM END -->

  </div>

  <script src="script.js"></script>
</body>
</html>
