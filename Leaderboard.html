### 2. Update `index.html`
Open your `index.html` file (your donation form). Add the link to the `<head>` section. If you have any internal `<style>` tags in this file that are redundant, remove them now:

```html
<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsoring - Coduvelo Tour '76</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    ```

Once you save these changes and refresh your browser, both pages will load the styles from `assets/css/style.css` automatically.
